# sports-pulse config
# Declares which stat categories to track per sport and how to compute them.

output_dir: output
top_n: 10

# Sports the site actually builds and shows, in toggle order. Only these are
# fetched and written to data.json. The worldcup block below is kept intact as
# a working reference/template for future soccer leagues (e.g. Premier League)
# but stays off until its key is listed here. See docs/leagues.md.
active_sports: [mlb]

mlb:
  base_url: https://statsapi.mlb.com/api/v1
  season: 2026
  window_games: 10        # rolling window size for counting stats
  candidate_pool_size: 40 # season leaders pulled per seed category before re-ranking on the rolling window
  recent_seed_days: 24    # date window (~20 games) for the recent-form pool seed
  recent_pool_size: 40    # top-N recent leaders unioned into the season pool

  stat_categories:
    - key: home_runs
      label: Home Runs (last 10 G)
      short_label: Home Runs
      unit: HR
      group: hitting
      mode: rolling_sum
      fields: [homeRuns]
      seed_leaderboards: [homeRuns]
      recent_seed_leaderboards: [hits, totalBases]  # union recent-form leaders so hot low-volume hitters qualify

    - key: total_bases
      label: Total Bases per Game (last 10 G, true avg)
      short_label: Total Bases/G
      unit: TB/G
      group: hitting
      mode: rolling_sum
      fields: [totalBases]
      per_game: true
      seed_leaderboards: [totalBases]
      recent_seed_leaderboards: [hits, totalBases]  # union recent-form leaders so hot low-volume hitters qualify

    - key: hits_runs_rbi
      label: Hits + Runs + RBI per Game (last 10 G, true avg)
      short_label: H+R+RBI/G
      unit: H+R+RBI/G
      group: hitting
      mode: rolling_sum
      fields: [hits, runs, rbi]
      per_game: true
      seed_leaderboards: [hits, runs, runsBattedIn]
      recent_seed_leaderboards: [hits, totalBases]  # union recent-form leaders so hot low-volume hitters qualify

    - key: strikeouts
      label: "Strikeouts per Game (last 10 G, today's starters only, true avg)"
      short_label: K/G (Starters)
      unit: K/G
      group: pitching
      mode: rolling_sum
      fields: [strikeOuts]
      per_game: true
      starters_only: true
      window_games: 10

    - key: hit_streak
      label: Active Hit Streak
      short_label: Hit Streak
      unit: GAMES
      group: hitting
      mode: hit_streak
      seed_leaderboards: [hits, runs, runsBattedIn, homeRuns, totalBases]
      recent_seed_leaderboards: [hits, totalBases]  # union recent-form leaders so hot low-volume hitters qualify

    # threshold_rate: how often a player clears a per-game bar within a
    # recent window. `fields` are summed per game, compared to `threshold`;
    # `min_games` is a small-sample qualification floor (fewer games in the
    # window than this and the player is dropped from ranking entirely).
    - key: hit_rate
      label: Hit Rate (games with 1+ hit, last 20 G)
      short_label: Hit Rate
      unit: "1+H"
      group: hitting
      mode: threshold_rate
      fields: [hits]
      threshold: 1
      window_games: 20
      min_games: 16
      seed_leaderboards: [hits, runs, runsBattedIn, homeRuns, totalBases]
      recent_seed_leaderboards: [hits, totalBases]  # union recent-form leaders so hot low-volume hitters qualify

    - key: run_producer_rate
      label: Run Producer Rate (games with 2+ H/R/RBI, last 20 G)
      short_label: Run Producer
      unit: "2+HRR"
      group: hitting
      mode: threshold_rate
      fields: [hits, runs, rbi]
      threshold: 2
      window_games: 20
      min_games: 16
      seed_leaderboards: [hits, runs, runsBattedIn, homeRuns, totalBases]
      recent_seed_leaderboards: [hits, totalBases]  # union recent-form leaders so hot low-volume hitters qualify

    # window_starts_only: the window counts a pitcher's actual starts (games
    # with gamesStarted >= 1), not calendar games, so relief cameos don't
    # dilute a starter's last-10-starts rate.
    - key: k_rate
      label: K Rate (starts with 6+ K, last 10 starts)
      short_label: K Rate
      unit: "6+K"
      group: pitching
      mode: threshold_rate
      fields: [strikeOuts]
      threshold: 6
      window_games: 10
      min_games: 6
      starters_only: true
      window_starts_only: true

# INACTIVE -- preserved as a template for future soccer leagues (see
# active_sports above and docs/leagues.md). Not fetched or shown while its key
# is absent from active_sports.
worldcup:
  competition: FIFA World Cup 2026
  scoreboard_url: https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard
  summary_url: https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/summary

  stat_categories:
    - key: shots
      label: Total Shots per Game (tournament, true avg)
      short_label: Total Shots/Game
      unit: SH/G
      mode: tournament_total
      fields: [totalShots]
      per_game: true

    - key: shots_on_goal
      label: Shots on Goal per Game (tournament, true avg)
      short_label: Shots on Goal/G
      unit: SOG/G
      mode: tournament_total
      fields: [shotsOnTarget]
      per_game: true

    - key: goals
      label: Goals (tournament)
      short_label: Goals
      unit: G
      mode: tournament_total
      fields: [totalGoals]

    - key: goal_or_assist
      label: Goal Involvements (tournament)
      short_label: Goal Involvements
      unit: G+A
      mode: tournament_total
      fields: [totalGoals, goalAssists]

    - key: assists
      label: Assists (tournament)
      short_label: Assists
      unit: A
      mode: tournament_total
      fields: [goalAssists]

    - key: clean_sheets
      label: Clean Sheets (tournament, starting GK, full match only)
      short_label: Clean Sheets
      unit: CS
      mode: tournament_total
      fields: [cleanSheets]

# Betting Signal Layer -- deterministic per-game Signal Scores per bet type,
# computed by betting_signals.py from the Game builder's existing inputs (14d
# OPS, 7d bullpen ERA, probable-starter ERA, season series) plus availability.
# Sport-keyed: mlb populated, other sports reserved empty. All values are v1,
# tunable (see the design proposal). `favors` direction per metric is intrinsic
# and lives in code, not here; this block holds weights, scales, and thresholds.
# Player matchup_note gate: the player's CAREER line vs the pitcher they face
# next gets a one-sentence AI note ONLY when it clears this bar (enough sample AND
# lopsided enough to matter). Provisional v1 -- tuned against a real-data hit-rate
# check. vs-pitcher history is inherently sparse, so notes fire selectively.
player_angle:
  mlb:
    # Two INDEPENDENT gates; the angle fires if EITHER clears.
    # avg path -- needs a real sample to trust a rate:
    min_ab_avg: 5      # at-bats floor for the avg paths
    hot_avg: 0.350     # "owns this pitcher"
    cold_avg: 0.150    # "has been overmatched"
    # hr path -- 2+ career HR is signal even in a small sample, so its own lower floor:
    min_ab_hr: 3       # at-bats floor for the HR path
    min_hr: 2

betting_signals:
  mlb:
    # Score below which a bet type reports "No clear lean" instead of a side.
    min_threshold: 15
    # Run Line needs a stronger lean (the favorite must cover 1.5 runs).
    run_line_threshold: 35
    # A game's single most-notable market must clear THIS (much stricter than the
    # per-market lean thresholds above) before the AI writes a one-sentence
    # betting_note about it. Below it, no betting prose is written at all. v1
    # tunable -- raise to write notes more rarely, lower to write them more often.
    standout_threshold: 50
    # tanh normalization: `*_gap` = the home-vs-away spread that reads as a
    # meaningful edge; `*_total`/`*_solo` = league baseline + spread for
    # over/under-style magnitudes.
    scales:
      ops_gap: 0.080
      bullpen_gap: 1.50
      era_gap: 1.20
      ops_total: { base: 1.45, scale: 0.15 }
      starter_total: { base: 8.0, scale: 2.5 }
      bullpen_total: { base: 8.0, scale: 3.0 }
      ops_solo: { base: 0.725, scale: 0.080 }
      era_solo: { base: 4.0, scale: 1.20 }
      bullpen_solo: { base: 4.0, scale: 1.50 }
    # Per bet type: which base signals feed it and their weights. Bullpen is
    # excluded from the first-five markets (relievers rarely pitch in the first
    # five innings); NRFI/YRFI and totals lean toward more runs on the (+) side.
    bet_types:
      moneyline:
        team_ops: 0.30
        bullpen_era: 0.25
        probable_era: 0.30
        season_series: 0.15
      run_line:
        team_ops: 0.30
        bullpen_era: 0.25
        probable_era: 0.30
        season_series: 0.15
      game_total:
        combined_ops: 0.35
        combined_starter_era: 0.35
        combined_bullpen_era: 0.30
      first_five_moneyline:
        probable_era: 0.55
        team_ops: 0.35
        season_series: 0.10
      first_five_total:
        combined_starter_era: 0.60
        combined_ops: 0.40
      nrfi_yrfi:
        combined_starter_era: 0.60
        combined_ops: 0.40
      team_total:
        team_ops: 0.45
        opp_bullpen_era: 0.30
        opp_starter_era: 0.25
  # Reserved for future sports (e.g. Premier League); empty = no betting layer.
  worldcup: {}

# ---------------------------------------------------------------------------
# Insights UI presentation, sport-keyed (mirrors betting_signals / player_angle).
# The Python build resolves these into data.json so the JS components stay
# sport-blind -- MLB fills its set now; NFL/NBA/CFB/PL get their own later
# WITHOUT touching component code. An empty/missing sport block simply means the
# config-driven affordances (category strip, comparison table) don't render for
# that sport; the generic pieces (pulse, signals, AI note) still do.
insights_ui:
  mlb:
    # Static category strip (icon names resolve to inline SVGs in the component's
    # registry -- config carries names/labels, never markup).
    signal_categories:
      - { key: starting_pitching, label: "Starting Pitching", icon: mound }
      - { key: bullpen,           label: "Bullpen Fatigue",    icon: relief }
      - { key: offense,           label: "Offense Form",       icon: bat }
    # Readable market names for the Signal Score list / Best Angle (replaces the
    # old hardcoded _BET_MARKET_LABELS in generate_insights.py). Keys match
    # betting_signals bet_types.
    market_labels:
      moneyline: "Moneyline"
      run_line: "Run Line"
      game_total: "Game Total"
      first_five_moneyline: "First Five Moneyline"
      first_five_total: "First Five Total"
      nrfi_yrfi: "First-Inning Runs"
      team_total: "Team Total"
    # Generic "compare N metrics between two entities" tables. `better` is the
    # winning direction; the build resolves which side wins per row. Metrics whose
    # data isn't in the pipeline yet are simply absent (K%/BB%/WHIP this phase).
    compare_sets:
      probable_starters:
        title: "Probable Starters"
        metrics:
          - { key: era, label: "ERA", format: era, better: low }
    # Implied-total label wording (the number/units the UI shows). Sport-specific
    # phrasing lives here, not in the JS.
    est_total:
      label: "Run Estimate"
      unit: "runs"
      note: "Rough model estimate from team form & pitching — not a betting line. No park, weather, or lineup data."
  # Reserved for future sports; empty = no config-driven affordances render.
  worldcup: {}
