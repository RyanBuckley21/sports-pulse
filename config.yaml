# sports-pulse config
# Declares which stat categories to track per sport and how to compute them.

output_dir: output
top_n: 10

mlb:
  base_url: https://statsapi.mlb.com/api/v1
  season: 2026
  window_games: 10        # rolling window size for counting stats
  candidate_pool_size: 40 # season leaders pulled per seed category before re-ranking on the rolling window

  stat_categories:
    - key: home_runs
      label: Home Runs (last 10 G)
      short_label: Home Runs
      unit: HR
      group: hitting
      mode: rolling_sum
      fields: [homeRuns]
      seed_leaderboards: [homeRuns]

    - key: total_bases
      label: Total Bases per Game (last 10 G, true avg)
      short_label: Total Bases/G
      unit: TB/G
      group: hitting
      mode: rolling_sum
      fields: [totalBases]
      per_game: true
      seed_leaderboards: [totalBases]

    - key: hits_runs_rbi
      label: Hits + Runs + RBI per Game (last 10 G, true avg)
      short_label: H+R+RBI/G
      unit: H+R+RBI/G
      group: hitting
      mode: rolling_sum
      fields: [hits, runs, rbi]
      per_game: true
      seed_leaderboards: [hits, runs, runsBattedIn]

    - key: strikeouts
      label: "Strikeouts per Game (last 10 G, today's starters only, true avg)"
      short_label: K/G (Starters)
      unit: K/G
      group: pitching
      mode: rolling_sum
      fields: [strikeOuts]
      per_game: true
      starters_only: true
      window_games: 10

    - key: hit_streak
      label: Active Hit Streak
      short_label: Hit Streak
      unit: GAMES
      group: hitting
      mode: hit_streak
      seed_leaderboards: [hits, runs, runsBattedIn, homeRuns, totalBases]

    # threshold_rate: how often a player clears a per-game bar within a
    # recent window. `fields` are summed per game, compared to `threshold`;
    # `min_games` is a small-sample qualification floor (fewer games in the
    # window than this and the player is dropped from ranking entirely).
    - key: hit_rate
      label: Hit Rate (games with 1+ hit, last 20 G)
      short_label: Hit Rate
      unit: "1+H"
      group: hitting
      mode: threshold_rate
      fields: [hits]
      threshold: 1
      window_games: 20
      min_games: 16
      seed_leaderboards: [hits, runs, runsBattedIn, homeRuns, totalBases]

    - key: run_producer_rate
      label: Run Producer Rate (games with 2+ H/R/RBI, last 20 G)
      short_label: Run Producer
      unit: "2+HRR"
      group: hitting
      mode: threshold_rate
      fields: [hits, runs, rbi]
      threshold: 2
      window_games: 20
      min_games: 16
      seed_leaderboards: [hits, runs, runsBattedIn, homeRuns, totalBases]

    # window_starts_only: the window counts a pitcher's actual starts (games
    # with gamesStarted >= 1), not calendar games, so relief cameos don't
    # dilute a starter's last-10-starts rate.
    - key: k_rate
      label: K Rate (starts with 6+ K, last 10 starts)
      short_label: K Rate
      unit: "6+K"
      group: pitching
      mode: threshold_rate
      fields: [strikeOuts]
      threshold: 6
      window_games: 10
      min_games: 6
      starters_only: true
      window_starts_only: true

worldcup:
  competition: FIFA World Cup 2026
  scoreboard_url: https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard
  summary_url: https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/summary

  stat_categories:
    - key: shots
      label: Total Shots per Game (tournament, true avg)
      short_label: Total Shots/Game
      unit: SH/G
      mode: tournament_total
      fields: [totalShots]
      per_game: true

    - key: shots_on_goal
      label: Shots on Goal per Game (tournament, true avg)
      short_label: Shots on Goal/G
      unit: SOG/G
      mode: tournament_total
      fields: [shotsOnTarget]
      per_game: true

    - key: goals
      label: Goals (tournament)
      short_label: Goals
      unit: G
      mode: tournament_total
      fields: [totalGoals]

    - key: goal_or_assist
      label: Goal Involvements (tournament)
      short_label: Goal Involvements
      unit: G+A
      mode: tournament_total
      fields: [totalGoals, goalAssists]

    - key: assists
      label: Assists (tournament)
      short_label: Assists
      unit: A
      mode: tournament_total
      fields: [goalAssists]

    - key: clean_sheets
      label: Clean Sheets (tournament, starting GK, full match only)
      short_label: Clean Sheets
      unit: CS
      mode: tournament_total
      fields: [cleanSheets]
