<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B1020"/>
      <stop offset="55%" stop-color="#1B1035"/>
      <stop offset="100%" stop-color="#3D0F2B"/>
    </linearGradient>
    <linearGradient id="pulse4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF7A45"/>
      <stop offset="50%" stop-color="#FFC93C"/>
      <stop offset="100%" stop-color="#FF4D6D"/>
    </linearGradient>
    <filter id="glow4" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="1024" height="1024" rx="230" fill="url(#bg4)"/>

  <!-- ring -->
  <circle cx="512" cy="512" r="270"
          fill="none" stroke="#F5F1E8" stroke-opacity="0.35" stroke-width="20"/>

  <!-- four marks around the ring, one per sport -->
  <circle cx="512" cy="242" r="16" fill="#F5F1E8" fill-opacity="0.6"/>
  <circle cx="782" cy="512" r="16" fill="#F5F1E8" fill-opacity="0.6"/>
  <circle cx="512" cy="782" r="16" fill="#F5F1E8" fill-opacity="0.6"/>
  <circle cx="242" cy="512" r="16" fill="#F5F1E8" fill-opacity="0.6"/>

  <!-- pulse line -->
  <path d="M 150 512 L 372 512 L 420 380 L 470 660 L 512 460 L 556 512 L 874 512"
        fill="none" stroke="url(#pulse4)" stroke-width="26"
        stroke-linecap="round" stroke-linejoin="round" filter="url(#glow4)"/>
</svg>
